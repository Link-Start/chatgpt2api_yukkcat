services:
  redis:
    image: redis:7-alpine
    container_name: chatgpt2api-local-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:-chatgpt2api_redis}
    volumes:
      - redis-local-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-chatgpt2api_redis}\" ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: chatgpt2api-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatgpt2api}
      POSTGRES_USER: ${POSTGRES_USER:-chatgpt2api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatgpt2api_postgres}
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatgpt2api:local
    container_name: chatgpt2api-local
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    environment:
      STORAGE_BACKEND: ${STORAGE_BACKEND:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-chatgpt2api}:${POSTGRES_PASSWORD:-chatgpt2api_postgres}@postgres:5432/${POSTGRES_DB:-chatgpt2api}}
      CHATGPT2API_AUTH_KEY: ${CHATGPT2API_AUTH_KEY:-}
      CHATGPT2API_BASE_URL: ${CHATGPT2API_BASE_URL:-}
      CHATGPT2API_IMAGE_ACCOUNT_CONCURRENCY: ${CHATGPT2API_IMAGE_ACCOUNT_CONCURRENCY:-1}
      CHATGPT2API_IMAGE_WORKER_CONCURRENCY: ${CHATGPT2API_IMAGE_WORKER_CONCURRENCY:-200}
      CHATGPT2API_IMAGE_WORKER_QUEUE_TIMEOUT_SECS: ${CHATGPT2API_IMAGE_WORKER_QUEUE_TIMEOUT_SECS:-30}
      CHATGPT2API_IMAGE_SLOT_WAIT_TIMEOUT_SECS: ${CHATGPT2API_IMAGE_SLOT_WAIT_TIMEOUT_SECS:-30}
      CHATGPT2API_IMAGE_LEASE_REDIS_URL: redis://:${REDIS_PASSWORD:-chatgpt2api_redis}@redis:6379/0
      CHATGPT2API_IMAGE_LEASE_NAMESPACE: ${CHATGPT2API_IMAGE_LEASE_NAMESPACE:-chatgpt2api}
      CHATGPT2API_IMAGE_LEASE_TTL_SECS: ${CHATGPT2API_IMAGE_LEASE_TTL_SECS:-900}
      CHATGPT2API_IMAGE_LEASE_REDIS_TIMEOUT_SECS: ${CHATGPT2API_IMAGE_LEASE_REDIS_TIMEOUT_SECS:-2}

volumes:
  redis-local-data:
  postgres-local-data:
